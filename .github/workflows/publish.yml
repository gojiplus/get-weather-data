name: Publish to PyPI

# The project's PyPI trusted publisher is configured for this workflow
# filename (publish.yml, no environment) — keep both stable or update
# the publisher config on pypi.org in lockstep.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # dynamic versioning reads tags
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false  # never publish from cached artifacts
      - name: Build distributions
        run: uv build
      - name: Publish (trusted publishing, PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          attestations: true
